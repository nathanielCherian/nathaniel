<!DOCTYPE html>
<html lang="en">
<head>
    <title>Wordhunt Solver</title>

    {% include 'snippets/meta.html' %}

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <style>
        body {
            margin: 0;
            background: #f0f0f0;
            color: black;
            width: 100%;
            height: 100%;
            font-family: none;
        }

        #board-wrapper {
            position: relative; /* so child div & canvas align absolutely inside */
            width: 320px;
            height: 320px;
        }
        
        #board-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 320px; /* 4 * 80px cells */
            height: 320px;
        }
        .cell {
            width: 80px;
            height: 80px;
            float: left;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #333;
            font-size: 24px;
            font-weight: bold;
            box-sizing: border-box;
            position: relative;
            z-index: 1; /* Ensure cells are above canvas */
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0; /* Arrows behind cells */
        }
        .container-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>


</head>

<body>

    <div class="container-box">
        <h1>Wordhunt Solver</h1>
        <div id="board-wrapper" style="display: none;">
            <div id="board-container"></div>
            <canvas id="arrow-canvas" width="320" height="320"></canvas>
        </div>

        <div>
            <div id="input-box" style="display: none;">
                <p>Please input your Wordhunt board from left-to-right top-to-bottom.</p>
                <p><small>(there should be 16 letters total)</small></p>
                <div style="display: flex; flex-direction: row;">
                    <input id="board-input">
                    <button id="start">Start</button>
                </div>
            </div>
            <div id="info-box" style="display: none;">
                <p>Current Word: <span id="displayed-word" style="font-weight: bold;"></span></p>
                <p style="font-style: italic;">Press the [SPACE] bar to receive the next word.</p>
            </div>
        </div>


    </div>

</body>

<script>
    const words_file = "/static/sketches/words.txt";

    async function fetchWords(url) {
        try {
            const response = await fetch(url);
            if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
            }
            const text = await response.text();
            const words = text.split(/\r?\n/).map(line => line.trim()).filter(Boolean);
            return words;
        } catch (error) {
            console.error("Error fetching words:", error);
            return [];
        }
    }

    const trie_map = {0:{}}
    var ind = 1;

    function build_trie(words) {
        for (const word of words) {
            var base = trie_map[0];
            for (let i = 0; i < word.length; i++) {
                const letter = word[i].toUpperCase();
                if (!(letter in base)) {
                    base[letter] = ind;
                    trie_map[ind] = {};
                    ind += 1;
                } 
                const new_base = trie_map[base[letter]];
                base = new_base;
            }
            base['.'] = true;
        }
        console.log("done building.")
    }


    // Check if contains word
    function contains_word(word) {
        var base = trie_map[0];
        for (let i = 0; i < word.length; i++) {
            const letter = word[i].toUpperCase();
            if (!(letter in base)) {
                return false;
            }
            base = trie_map[base[letter]];
        }
        return '.' in base;
    }


    const index_to_coord = (ind) => {
        return [Math.floor(ind/size), ind % size];
    }
    const coord_to_index = (coord) => {
        return size*coord[0] + coord[1];
    }

    function get_neighbors(point) {
        const neighbors = []
        const pair = index_to_coord(point);
        for (let x = -1; x <= 1; x++) {
            for (let y = -1; y <= 1; y++) {
                if (x == 0 && y == 0) {
                    continue;
                }
                const new_x = pair[0] + x;
                const new_y = pair[1] + y;
                if (new_x < 0 || new_x >= size || new_y < 0 || new_y >= size) {
                    continue;
                }
                neighbors.push(coord_to_index([new_x, new_y]));
            }
        }
        return neighbors;
    }


    function traverseTrie(cur_trie, new_letter, board) {
        if (new_letter.toUpperCase() in cur_trie) {
            return trie_map[cur_trie[new_letter.toUpperCase()]];
        } else {
            return false;
        }
    }

    function traverse_point(points, current_trie, found_words, board) {
        // Check if there is an end-word token here
        if ('.' in current_trie) {
            found_words.push([...points])
            // console.log(points);
        }

        // get options from this point.
        const options = get_neighbors(points[points.length-1]);
        // check each option that is not already in the points
        for (let i = 0; i < options.length; i++) {
            const option_point = options[i];
            if (!(points.includes(option_point))) {
                // Now, lets check if this new letter exists in this trie
                const new_trie = traverseTrie(current_trie, board[option_point], board);
                if (new_trie != false) {
                    // Yay. Now, we can add the new point onto the list of points
                    traverse_point([...points, option_point], new_trie, found_words, board);
                }
            }
        }
    }

    const size = 4;
</script>

<script>
    const input_div_box = document.getElementById("input-box");
    const board_input_box = document.getElementById("board-input");
    const start_button = document.getElementById("start");
    const displayed_word = document.getElementById("displayed-word");
    const board_wrapper = document.getElementById("board-wrapper");
    const info_box = document.getElementById("info-box");

    fetchWords(words_file).then(words => {
        build_trie(words);
        input_div_box.style = "display: block;"
    });

    // If you want Enter in input to start as well:
    board_input_box.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault(); // prevent form submission if inside a form
            start();
        }
    });

    start_button.addEventListener("click", start);

    let currentWordIndex = 0;
    let wordSequence = []; // will store found_words globally
    var usedWordSet = new Set();

    const getNextWord = (board) => {
        var str;
        do {
            if (currentWordIndex >= wordSequence.length) {
                return wordSequence.length - 1;
            }
            var str = wordSequence[currentWordIndex].map(v => board[v]).join('');
            currentWordIndex += 1;
        } while (usedWordSet.has(str));
        usedWordSet.add(str);
        return currentWordIndex - 1;
    }

    function start() {
        const board = board_input_box.value.toUpperCase().split(''); 
        if (board.length != size**2) {
            throw Error("board is not valid");
        }

        wordSequence = [];
        usedWordSet = new Set();
        board_wrapper.style = "display: block;";
        info_box.style = "display: block;";

        // Clear previous board cells
        container.innerHTML = '';

        draw_board(board);

        const found_words = []
        for (let i = 0; i < size**2; i++) {
            const initial_trie = traverseTrie(trie_map[0], board[i]);
            traverse_point([i], initial_trie, found_words, board);
        }

        console.log(found_words.length);

        // Sort words by length descending
        const uniqueFoundWords = [...new Set(found_words)].sort((a, b) => b.length - a.length);
        
        console.log(uniqueFoundWords)

        // found_words.sort((a, b) => b.length - a.length);

        wordSequence = uniqueFoundWords; // save globally
        currentWordIndex = 0;

        if (wordSequence.length > 0) {
            // Draw the first word initially
            const ind = getNextWord(board);
            const str = wordSequence[ind].map(v => board[v]).join('');
            displayed_word.textContent = str;
            drawArrowSequence(wordSequence[ind]);
        }
    }


    document.addEventListener("keydown", function(event) {
        if (event.code === "Space") {
            event.preventDefault(); // prevent page scroll
            if (currentWordIndex >= wordSequence.length) return;

            const board = board_input_box.value.toUpperCase().split('');
            const ind = getNextWord(board);
            const word = wordSequence[ind];
            displayed_word.textContent = word.map(v => board[v]).join('');
            drawArrowSequence(word);
        }
    });


</script>

<script>
    const container = document.getElementById('board-container');
    const canvas = document.getElementById('arrow-canvas');
    const ctx = canvas.getContext('2d');

    function draw_board(board) {
        // Create board cells
        board.forEach((letter, i) => {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.index = i;
            cell.textContent = letter.toUpperCase();
            container.appendChild(cell);
        });
    }

    // Helper: get center coordinates of a cell
    function getCellCenter(index) {
        const cell = container.children[index];
        const rect = cell.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect();
        return [
            rect.left - containerRect.left + rect.width/2,
            rect.top - containerRect.top + rect.height/2
        ];
    }

    // Draw arrows between a sequence of indices
function drawArrowSequence(indices) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "red";
    ctx.fillStyle = "red";
    ctx.lineWidth = 3;

    for(let i=0; i<indices.length-1; i++){
        const [x1, y1] = getCellCenter(indices[i]);
        const [x2, y2] = getCellCenter(indices[i+1]);
        const vec = [x2-x1, y2-y1];
        drawArrow(x1+vec[0]*0.05, y1+vec[1]*0.05, x1+vec[0]*0.95, y1+vec[1]*0.95);
    }

    // Draw dots at start and end
    const [startX, startY] = getCellCenter(indices[0]);
    const [endX, endY] = getCellCenter(indices[indices.length-1]);
    const radius = 12;

    // Start dot
    ctx.strokeStyle = "green";
    ctx.fillStyle = "green";
    ctx.beginPath();
    ctx.arc(startX, startY, radius, 0, Math.PI * 2);
    ctx.fill();

    // End dot
    ctx.strokeStyle = "purple";
    ctx.fillStyle = "purple";
    ctx.beginPath();
    ctx.arc(endX, endY, radius, 0, Math.PI * 2);
    ctx.fill();
}

    // Draw single arrow from (x1,y1) to (x2,y2)
    function drawArrow(x1, y1, x2, y2){
        const headLength = 20; // arrowhead size
        const dx = x2 - x1;
        const dy = y2 - y1;
        const angle = Math.atan2(dy, dx);
        
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();

        // Draw arrowhead
        ctx.beginPath();
        ctx.moveTo(x2, y2);
        ctx.lineTo(x2 - headLength * Math.cos(angle - Math.PI/6),
                y2 - headLength * Math.sin(angle - Math.PI/6));
        ctx.lineTo(x2 - headLength * Math.cos(angle + Math.PI/6),
                y2 - headLength * Math.sin(angle + Math.PI/6));
        ctx.lineTo(x2, y2);
        ctx.fill();
    }

    // Example usage: draw arrows for the path [0,5,6,10]
    // drawArrowSequence([0,5,6,10,11,12]);
</script>




</html>
